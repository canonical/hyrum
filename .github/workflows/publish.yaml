name: publish

on:
  push:
    tags: ['v*']

permissions: {}

jobs:
  publish:
    name: Build and publish to PyPI (trusted publishing)
    runs-on: ubuntu-latest
    environment:
      name: publish-pypi
      url: https://pypi.org/p/hyrum
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false
      - run: uv build
      - name: Generate CycloneDX SBOM
        run: |
          uv sync --frozen --no-dev
          uv run --project .github/sbom cyclonedx-py environment .venv \
            --output-format JSON \
            --output-file sbom.cdx.json
      # Two separate attestations: SLSA provenance (how it was built)
      # and CycloneDX SBOM (what's inside). attest-build-provenance
      # doesn't accept sbom-path, so the SBOM predicate needs its own call.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: 'dist/*'
      - name: Attest SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: 'dist/*'
          sbom-path: sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: error
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
