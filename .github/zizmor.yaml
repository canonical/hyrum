# zizmor policy for hyrum. The team convention (per the canonical/charm-tech
# estate audit) is: SHA-pin all third-party actions, and accept ref pins only
# for actions owned by GitHub or PyPA.
rules:
  unpinned-uses:
    config:
      policies:
        "actions/*": ref-pin
        "github/*": ref-pin
        "pypa/*": ref-pin
