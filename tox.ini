; Adapted from canonical/charm-tech python/tox-template.ini (PR #2). The unit
; environment writes coverage directly to the repo's `tests/` directory rather
; than `tests/unit/` because hyrum doesn't currently have an integration
; test split.

[tox]
requires =
    tox>=4.2
    tox-uv
env_list = lint, static, unit

[testenv]
runner = uv-venv-lock-runner

[testenv:format]
description = Apply coding style standards to code
dependency_groups = lint
commands = ruff format --preview

[testenv:lint]
description = Check code against coding style standards
dependency_groups = lint
commands =
    ruff check --preview
    ruff format --preview --check
    codespell {posargs}

[testenv:static]
description = Run static type checker
dependency_groups = unit, static
commands = pyright {posargs}

[testenv:unit]
description = Run unit tests
dependency_groups = unit
commands =
    coverage run --source={[vars]src_path} -m pytest {posargs} {[vars]tests_path}
    coverage report

[vars]
src_path = src
tests_path = tests
